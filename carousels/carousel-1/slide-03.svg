<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="200" cy="300" r="300" fill="#6c5ce7" fill-opacity="0.06"/>
  <circle cx="950" cy="800" r="260" fill="#00d2ff" fill-opacity="0.05"/>

  <!-- Slide number -->
  <text x="80" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#8888a0" letter-spacing="2">03 / 07</text>
  <rect x="80" y="120" width="920" height="1.5" fill="white" fill-opacity="0.06"/>

  <!-- Eyebrow -->
  <rect x="80" y="180" width="6" height="60" rx="3" fill="url(#gr)"/>
  <text x="106" y="222" font-family="'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" fill="#6c5ce7" letter-spacing="2">MY STACK</text>

  <!-- Headline -->
  <text x="80" y="360" font-family="'Segoe UI',system-ui,sans-serif" font-size="72" font-weight="800" fill="#e8e8f0" letter-spacing="-2">Just two tools.</text>
  <text x="80" y="445" font-family="'Segoe UI',system-ui,sans-serif" font-size="72" font-weight="800" fill="#e8e8f0" letter-spacing="-2">That's it.</text>

  <!-- Tool cards -->
  <!-- n8n card -->
  <rect x="80" y="510" width="430" height="200" rx="20" fill="#16161f" stroke="url(#gr)" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="80" y="510" width="430" height="5" rx="3" fill="url(#gr)"/>
  <text x="295" y="600" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="900" fill="#e8e8f0" text-anchor="middle">n8n</text>
  <text x="295" y="650" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" fill="#8888a0" text-anchor="middle">Workflow Engine</text>
  <text x="295" y="685" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#6c5ce7" text-anchor="middle">1,000+ integrations</text>

  <!-- OpenAI card -->
  <rect x="570" y="510" width="430" height="200" rx="20" fill="#16161f" stroke="url(#gr)" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="570" y="510" width="430" height="5" rx="3" fill="url(#gr)"/>
  <text x="785" y="600" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="900" fill="#e8e8f0" text-anchor="middle">OpenAI</text>
  <text x="785" y="650" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" fill="#8888a0" text-anchor="middle">AI Backbone</text>
  <text x="785" y="685" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#00d2ff" text-anchor="middle">GPT-4o & beyond</text>

  <!-- Plus sign between -->
  <text x="540" y="625" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="700" fill="url(#gr)" text-anchor="middle">+</text>

  <!-- Result -->
  <rect x="80" y="760" width="920" height="130" rx="16" fill="#16161f" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <text x="540" y="825" font-family="'Segoe UI',system-ui,sans-serif" font-size="38" font-weight="700" fill="#e8e8f0" text-anchor="middle">= 10+ production workflows</text>
  <text x="540" y="870" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" fill="#8888a0" text-anchor="middle">running right now</text>

  <!-- Bottom -->
  <text x="80" y="980" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" font-weight="700" fill="#6c5ce7">@efiayomideai</text>
  <text x="1000" y="980" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#8888a0" text-anchor="end">swipe →</text>
  <rect x="0" y="1070" width="1080" height="10" fill="url(#gr)" fill-opacity="0.6"/>
</svg>
