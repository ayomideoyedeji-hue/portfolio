<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="280" fill="#6c5ce7" fill-opacity="0.06"/>
  <circle cx="150" cy="850" r="250" fill="#00d2ff" fill-opacity="0.05"/>

  <!-- Slide number -->
  <text x="80" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#8888a0" letter-spacing="2">02 / 07</text>
  <rect x="80" y="120" width="920" height="1.5" fill="white" fill-opacity="0.06"/>

  <!-- Large decorative number -->
  <text x="800" y="420" font-family="'Segoe UI',system-ui,sans-serif" font-size="380" font-weight="900" fill="#6c5ce7" fill-opacity="0.05" text-anchor="middle">2</text>

  <!-- Eyebrow -->
  <rect x="80" y="180" width="6" height="60" rx="3" fill="url(#gr)"/>
  <text x="106" y="222" font-family="'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" fill="#6c5ce7" letter-spacing="2">WHO I AM</text>

  <!-- Main content -->
  <text x="80" y="360" font-family="'Segoe UI',system-ui,sans-serif" font-size="78" font-weight="800" fill="#e8e8f0" letter-spacing="-2">My name is Efi.</text>

  <text x="80" y="490" font-family="'Segoe UI',system-ui,sans-serif" font-size="42" fill="#8888a0">I'm an AI Engineer based in Nigeria.</text>

  <!-- Divider -->
  <rect x="80" y="540" width="80" height="3" rx="2" fill="url(#gr)"/>

  <text x="80" y="630" font-family="'Segoe UI',system-ui,sans-serif" font-size="44" fill="#e8e8f0">I don't build ChatGPT —</text>
  <text x="80" y="690" font-family="'Segoe UI',system-ui,sans-serif" font-size="44" fill="#e8e8f0">I build the systems that</text>
  <text x="80" y="760" font-family="'Segoe UI',system-ui,sans-serif" font-size="44" fill="url(#gr)" font-weight="700">connect AI to real</text>
  <text x="80" y="820" font-family="'Segoe UI',system-ui,sans-serif" font-size="44" fill="url(#gr)" font-weight="700">business problems.</text>

  <!-- Bottom -->
  <text x="80" y="980" font-family="'Segoe UI',system-ui,sans-serif" font-size="28" font-weight="700" fill="#6c5ce7">@efiayomideai</text>
  <text x="1000" y="980" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#8888a0" text-anchor="end">swipe →</text>
  <rect x="0" y="1070" width="1080" height="10" fill="url(#gr)" fill-opacity="0.6"/>
</svg>
