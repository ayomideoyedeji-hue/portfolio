<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background (for profile pic use) -->
  <rect width="100" height="100" rx="22" fill="#0a0a0f"/>

  <!-- Subtle bg circle -->
  <circle cx="50" cy="50" r="40" fill="url(#g)" fill-opacity="0.1"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#g)" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Connection lines -->
  <line x1="50" y1="20" x2="50" y2="42" stroke="url(#g)" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="43" y1="58" x2="26" y2="74" stroke="url(#g)" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="57" y1="58" x2="74" y2="74" stroke="url(#g)" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="58" y1="44" x2="74" y2="26" stroke="url(#g)" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="26" y1="74" x2="74" y2="74" stroke="url(#g)" stroke-width="1.8" stroke-opacity="0.35"/>

  <!-- Pulse rings -->
  <circle cx="50" cy="16" r="8" fill="none" stroke="url(#g)" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="24" cy="78" r="7" fill="none" stroke="url(#g)" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="76" cy="78" r="7" fill="none" stroke="url(#g)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Nodes -->
  <circle cx="50" cy="16" r="5" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="24" cy="78" r="4.5" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="76" cy="78" r="4.5" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="76" cy="24" r="3.5" fill="url(#g)" fill-opacity="0.75"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="8" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="4" fill="white" fill-opacity="0.95"/>
</svg>
